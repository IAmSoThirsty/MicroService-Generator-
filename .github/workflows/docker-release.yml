# Genesis Microservices Generator — Docker Build & Release
#
# Builds a multi-arch Docker image and publishes it to:
#   - GitHub Container Registry (ghcr.io)
#
# Triggers:
#   - Push to main         → tag :latest
#   - Push to release/**   → tag :release-<branch>
#   - Tag push (v*)        → tag :<version> + GitHub Release artifact
#   - Pull request         → build-only (no push), sanity check
#   - Manual dispatch      → tag :manual-<sha>

name: "Docker — Build & Release"

on:
  push:
    branches: [main, release/**]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/microservice-generator

jobs:

  # ────────────────────────────────────────────────────────────
  # Build (and optionally push) the Docker image
  # ────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub Releases
      packages: write       # push to GHCR
      id-token: write       # OIDC provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Buildx ──────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GHCR (skip on PRs) ────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags & labels ─────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :v1.2.3 on tag push
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :sha-<short> on every build
            type=sha,prefix=sha-
            # branch name
            type=ref,event=branch
            # PR number (build-only)
            type=ref,event=pr

      # ── Build (and push on non-PR events) ─────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Export image as tar for GitHub Release artifact ────
      - name: Export Docker image tarball
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
            | gzip > microservice-generator-${{ steps.meta.outputs.version }}.tar.gz

      # ── Create GitHub Release with artifact ───────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Genesis Microservices Generator ${{ steps.meta.outputs.version }}"
          body: |
            ## 🚀 Genesis Microservices Generator ${{ steps.meta.outputs.version }}

            ### Docker (recommended)
            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            docker run --rm -p 8001:8001 \
              -e MONGO_URL=mongodb://your-mongo:27017 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ```

            ### docker-compose (full stack)
            ```bash
            # Download docker-compose.yml from the repository, then:
            docker compose up -d
            # Open http://localhost:8001
            ```

            ### Self-contained tarball
            Download `microservice-generator-${{ steps.meta.outputs.version }}.tar.gz`, then:
            ```bash
            docker load < microservice-generator-${{ steps.meta.outputs.version }}.tar.gz
            docker run --rm -p 8001:8001 \
              -e MONGO_URL=mongodb://localhost:27017 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ```
          files: |
            microservice-generator-${{ steps.meta.outputs.version }}.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
