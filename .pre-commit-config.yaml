# Pre-commit configuration for Genesis Microservices Generator
# Install: pip install pre-commit && pre-commit install
repos:
  # ── Built-in hooks ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch=main"]

  # ── Python quality ────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--exclude=__pycache__,*.j2"]

  # ── Security ──────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # ── Genesis Sacred Zone ───────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: genesis-sacred-zone-check
        name: "Genesis — Sacred Zone Integrity"
        entry: python scripts/pre-commit-sacred-check.py
        language: python
        pass_filenames: true
        always_run: false
        description: "Prevents modification of sacred zones in genesis-managed files"
